<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Closet</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Work+Sans:wght@300;400;500&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --cream: #FAF8F5;
            --beige: #E8E3DA;
            --warm-beige: #D4C9B8;
            --brown: #8B7B6A;
            --dark-brown: #5C4F42;
            --charcoal: #2A2520;
            --black: #1A1816;
        }

        body {
            font-family: 'Work Sans', sans-serif;
            background: var(--cream);
            color: var(--charcoal);
            line-height: 1.6;
            padding: 0;
            overflow-x: hidden;
        }

        .container { 
            max-width: 1600px; 
            margin: 0 auto; 
            padding: 60px 40px;
        }
        
        header { 
            text-align: center; 
            margin-bottom: 80px;
            border-bottom: 1px solid var(--beige);
            padding-bottom: 40px;
        }
        
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 4.5em;
            font-weight: 300;
            letter-spacing: 0.05em;
            color: var(--black);
            margin-bottom: 12px;
        }

        .subtitle { 
            font-size: 0.85em; 
            color: var(--brown);
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }
        
        .auto-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--black);
            color: var(--cream);
            padding: 8px 24px;
            border-radius: 2px;
            margin-top: 24px;
            font-size: 0.7em;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 500;
        }

        .pulse-dot {
            width: 6px; 
            height: 6px;
            background: var(--cream);
            border-radius: 50%;
            animation: pulseDot 2s infinite;
        }

        @keyframes pulseDot { 
            0%, 100% { opacity: 1; } 
            50% { opacity: 0.3; } 
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2px;
            margin-bottom: 60px;
            background: var(--beige);
            padding: 2px;
        }

        .stat-card {
            background: var(--cream);
            padding: 48px 32px;
            text-align: center;
            transition: all 0.4s ease;
        }

        .stat-card:hover {
            background: var(--black);
        }

        .stat-card:hover .stat-value {
            color: var(--cream);
        }

        .stat-card:hover .stat-label {
            color: var(--warm-beige);
        }

        .stat-value {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.5em;
            font-weight: 300;
            color: var(--black);
            margin-bottom: 8px;
            transition: color 0.4s ease;
        }

        .stat-label {
            font-size: 0.75em;
            color: var(--brown);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-weight: 400;
            transition: color 0.4s ease;
        }

        .controls {
            background: white;
            border: 1px solid var(--beige);
            padding: 32px;
            margin-bottom: 60px;
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 280px;
            padding: 16px 20px;
            background: var(--cream);
            border: 1px solid var(--beige);
            color: var(--charcoal);
            font-size: 0.9em;
            font-family: 'Work Sans', sans-serif;
            transition: all 0.3s;
            font-weight: 300;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--dark-brown);
            background: white;
        }

        .search-box::placeholder { 
            color: var(--brown);
            font-weight: 300;
        }

        .category-tabs { 
            display: flex; 
            gap: 0; 
            flex-wrap: wrap; 
        }
        
        .category-tab {
            padding: 14px 28px;
            background: transparent;
            border: 1px solid var(--beige);
            border-right: none;
            color: var(--brown);
            cursor: pointer;
            font-size: 0.8em;
            font-weight: 400;
            transition: all 0.3s;
            font-family: 'Work Sans', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .category-tab:last-child {
            border-right: 1px solid var(--beige);
        }

        .category-tab:hover { 
            background: var(--beige);
            color: var(--charcoal);
        }
        
        .category-tab.active {
            background: var(--black);
            border-color: var(--black);
            color: var(--cream);
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2px;
            background: var(--beige);
            padding: 2px;
        }

        .item-card {
            background: white;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }

        .item-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 24px 48px rgba(0,0,0,0.08);
        }

        .item-card:hover .item-image-placeholder {
            background: var(--black);
        }

        .item-card:hover .item-image-placeholder::after {
            opacity: 1;
        }

        .item-image-placeholder {
            width: 100%;
            aspect-ratio: 3/4;
            background: var(--beige);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            position: relative;
            transition: all 0.5s ease;
        }

        .item-image-placeholder::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, 
                rgba(212, 201, 184, 0.3) 0%, 
                rgba(92, 79, 66, 0.3) 100%);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .item-content { 
            padding: 32px 28px;
        }
        
        .item-merchant {
            font-size: 0.7em;
            color: var(--brown);
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 12px;
        }

        .item-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6em;
            font-weight: 400;
            margin-bottom: 24px;
            color: var(--black);
            line-height: 1.3;
        }

        .item-details { 
            display: grid; 
            gap: 14px; 
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--beige);
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85em;
        }

        .detail-label { 
            color: var(--brown);
            font-weight: 300;
        }
        
        .detail-value { 
            font-weight: 400;
            color: var(--charcoal);
        }

        .item-price {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2em;
            font-weight: 300;
            color: var(--black);
        }

        .category-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 18px;
            bbackground: var(--black);
            backdrop-filter: blur(8px);
            color: var(--cream);
            font-size: 0.65em;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(250, 248, 245, 0.2);
        }

        .category-badge:hover {
            background: var(--black);
            transform: scale(1.05);
        }

        .edit-btn {
    position: absolute;
    top: 20px;
    left: 20px;
    background: white;
    color: var(--black);
    border: 2px solid var(--black);
            width: 36px;
            height: 36px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
            font-weight: 400;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .edit-btn:hover {
            background: var(--black);
            color: var(--cream);
            border-color: var(--black);
        }

        .empty-state {
            text-align: center;
            padding: 120px 40px;
            color: var(--brown);
            grid-column: 1 / -1;
            background: white;
        }

        .empty-icon { 
            font-size: 4em; 
            margin-bottom: 32px; 
            opacity: 0.4;
        }

        .notification {
            position: fixed;
            top: 40px;
            right: 40px;
            background: var(--black);
            color: var(--cream);
            padding: 20px 32px;
            border: 1px solid var(--dark-brown);
            z-index: 3000;
            animation: slideIn 0.4s ease;
            font-weight: 300;
            font-size: 0.9em;
            letter-spacing: 0.05em;
        }

        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(26, 24, 22, 0.85);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: white;
            border: 1px solid var(--beige);
            padding: 56px 48px;
            max-width: 560px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.4em;
            font-weight: 300;
            margin-bottom: 40px;
            color: var(--black);
            letter-spacing: 0.02em;
        }

        .form-group { margin-bottom: 28px; }
        
        .form-label {
            display: block;
            margin-bottom: 10px;
            font-weight: 400;
            color: var(--brown);
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 14px 16px;
            background: var(--cream);
            border: 1px solid var(--beige);
            color: var(--charcoal);
            font-size: 0.95em;
            font-family: 'Work Sans', sans-serif;
            font-weight: 300;
            transition: all 0.3s;
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: var(--dark-brown);
            background: white;
        }

        .form-buttons {
            display: flex;
            gap: 12px;
            margin-top: 40px;
        }

        .btn {
            flex: 1;
            padding: 16px;
            border: none;
            font-size: 0.85em;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Work Sans', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .btn:hover { 
            transform: translateY(-2px);
        }
        
        .btn-primary {
            background: var(--black);
            color: var(--cream);
            border: 1px solid var(--black);
        }

        .btn-primary:hover {
            background: var(--dark-brown);
            border-color: var(--dark-brown);
        }

        .btn-secondary {
            background: transparent;
            color: var(--charcoal);
            border: 1px solid var(--beige);
        }

        .btn-secondary:hover {
            background: var(--beige);
        }

        @media (max-width: 768px) {
            h1 { font-size: 3em; }
            .container { padding: 40px 24px; }
            .items-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>CLOSET</h1>
            <p class="subtitle">Curated Collection</p>
            <div class="auto-badge">
                <span class="pulse-dot"></span>
                <span id="syncStatus">Syncing</span>
            </div>
        </header>

        <div class="stats" id="stats"></div>

        <div class="controls">
            <input type="text" class="search-box" id="searchBox" placeholder="Search collection...">
            <div class="category-tabs" id="categoryTabs"></div>
        </div>

        <div class="items-grid" id="itemsGrid"></div>
    </div>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <h2 class="modal-title">Edit Item</h2>
            <form id="editItemForm">
                <div class="form-group">
                    <label class="form-label">Item Name</label>
                    <input type="text" class="form-input" id="editItemName">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Category</label>
                    <select class="form-select" id="editCategory">
                        <option value="Tops">Tops</option>
                        <option value="Bottoms">Bottoms</option>
                        <option value="Dresses">Dresses</option>
                        <option value="Outerwear">Outerwear</option>
                        <option value="Shoes">Shoes</option>
                        <option value="Accessories">Accessories</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Store</label>
                    <input type="text" class="form-input" id="editMerchant">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Color</label>
                    <input type="text" class="form-input" id="editColor">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Size</label>
                    <input type="text" class="form-input" id="editSize">
                </div>

                <div class="form-buttons">
                    <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SHEET_ID = '18tBYQ1f65Frly3ZDJnOmLuK_tcmr29qAehFHxPqR0Ow';
        let items = [];
        let currentCategory = 'All';
        let searchTerm = '';
        let lastSyncedCount = 0;
        let editingIndex = -1;

        async function syncFromSheet() {
            try {
                document.getElementById('syncStatus').textContent = 'Syncing';
                
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
                const response = await fetch(url);
                const text = await response.text();
                
                const jsonText = text.substring(47).slice(0, -2);
                const data = JSON.parse(jsonText);
                
                const rows = data.table.rows;
                const newItems = [];
                
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row.c) continue;
                    
                    const getValue = (index) => {
                        return row.c[index] && row.c[index].v ? String(row.c[index].v) : '';
                    };
                    
                    const merchant = getValue(1);
                    const priceStr = getValue(3);
                    
                    if (!merchant || !priceStr) continue;
                    
                    const price = parseFloat(priceStr);
                    if (isNaN(price) || price <= 0) continue;
                    
                    newItems.push({
                        merchant: merchant,
                        itemName: getValue(4) || `${merchant} Item`,
                        price: price,
                        color: getValue(6) || '',
                        size: getValue(7) || '',
                        sku: getValue(5) || '',
                        purchaseDate: getValue(2) || '',
                        category: 'Other',
                        imageUrl: ''
                    });
                }
                
                const editedItems = loadEditedItems();
                for (let i = 0; i < newItems.length; i++) {
                    const edited = editedItems.find(e => 
                        e.sku === newItems[i].sku && 
                        e.purchaseDate === newItems[i].purchaseDate
                    );
                    if (edited) {
                        newItems[i] = { ...newItems[i], ...edited };
                    }
                }
                
                const currentCount = newItems.length;
                if (currentCount > lastSyncedCount && lastSyncedCount > 0) {
                    const newCount = currentCount - lastSyncedCount;
                    showNotification(`${newCount} new item${newCount > 1 ? 's' : ''} added`);
                }
                
                lastSyncedCount = currentCount;
                items = newItems;
                saveItems();
                renderAll();
                
                document.getElementById('syncStatus').textContent = 'Auto-sync';
            } catch (error) {
                console.error('Sync error:', error);
                document.getElementById('syncStatus').textContent = 'Error';
            }
        }

        function loadEditedItems() {
            try {
                const saved = localStorage.getItem('editedItems');
                return saved ? JSON.parse(saved) : [];
            } catch (error) {
                return [];
            }
        }

        function saveEditedItems(editedItems) {
            try {
                localStorage.setItem('editedItems', JSON.stringify(editedItems));
            } catch (error) {
                console.error('Error saving edits:', error);
            }
        }

        function saveItems() {
            try {
                localStorage.setItem('closetItems', JSON.stringify(items));
                localStorage.setItem('lastSyncedCount', lastSyncedCount.toString());
            } catch (error) {
                console.error('Storage error:', error);
            }
        }

        function loadItems() {
            try {
                const saved = localStorage.getItem('closetItems');
                if (saved) {
                    items = JSON.parse(saved);
                }
                const savedCount = localStorage.getItem('lastSyncedCount');
                if (savedCount) {
                    lastSyncedCount = parseInt(savedCount);
                }
            } catch (error) {
                console.error('Error loading items:', error);
                items = [];
            }
            
            renderAll();
        }

        function openEditModal(index) {
            editingIndex = index;
            const item = items[index];
            
            document.getElementById('editItemName').value = item.itemName;
            document.getElementById('editCategory').value = item.category;
            document.getElementById('editMerchant').value = item.merchant;
            document.getElementById('editColor').value = item.color || '';
            document.getElementById('editSize').value = item.size || '';
            
            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            editingIndex = -1;
        }

        document.getElementById('editItemForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            if (editingIndex === -1) return;
            
            const item = items[editingIndex];
            item.itemName = document.getElementById('editItemName').value;
            item.category = document.getElementById('editCategory').value;
            item.merchant = document.getElementById('editMerchant').value;
            item.color = document.getElementById('editColor').value;
            item.size = document.getElementById('editSize').value;
            
            const editedItems = loadEditedItems();
            const existingIndex = editedItems.findIndex(e => 
                e.sku === item.sku && e.purchaseDate === item.purchaseDate
            );
            
            const editedItem = {
                sku: item.sku,
                purchaseDate: item.purchaseDate,
                itemName: item.itemName,
                category: item.category,
                merchant: item.merchant,
                color: item.color,
                size: item.size
            };
            
            if (existingIndex >= 0) {
                editedItems[existingIndex] = editedItem;
            } else {
                editedItems.push(editedItem);
            }
            
            saveEditedItems(editedItems);
            saveItems();
            renderAll();
            closeEditModal();
            showNotification('Updated');
        });

        function renderAll() {
            renderStats();
            renderTabs();
            renderItems();
        }

        function renderStats() {
            const totalItems = items.length;
            const totalSpent = items.reduce((sum, item) => sum + parseFloat(item.price || 0), 0);
            const uniqueStores = new Set(items.map(item => item.merchant)).size;
            
            document.getElementById('stats').innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${totalItems}</div>
                    <div class="stat-label">Items</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">$${totalSpent.toFixed(2)}</div>
                    <div class="stat-label">Value</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${uniqueStores}</div>
                    <div class="stat-label">Stores</div>
                </div>
            `;
        }

        function renderTabs() {
            const categories = ['All', ...new Set(items.map(item => item.category))];
            
            document.getElementById('categoryTabs').innerHTML = categories.map(cat => `
                <button class="category-tab ${currentCategory === cat ? 'active' : ''}" 
                        onclick="setCategory('${cat}')">
                    ${cat}
                </button>
            `).join('');
        }

        function renderItems() {
            let filteredItems = items;
            
            if (currentCategory !== 'All') {
                filteredItems = filteredItems.filter(item => item.category === currentCategory);
            }
            
            if (searchTerm) {
                filteredItems = filteredItems.filter(item => 
                    item.merchant?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    item.itemName?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    item.color?.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }
            
            if (filteredItems.length === 0) {
                document.getElementById('itemsGrid').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">—</div>
                        <h3 style="font-family: 'Cormorant Garamond', serif; font-size: 1.8em; margin-bottom: 12px; font-weight: 300; color: var(--charcoal);">Empty</h3>
                        <p style="color: var(--brown); font-size: 0.9em;">Your collection awaits</p>
                    </div>
                `;
                return;
            }
            
            document.getElementById('itemsGrid').innerHTML = filteredItems.map((item, filteredIndex) => {
                const actualIndex = items.indexOf(item);
                return `
                <div class="item-card">
                    <button class="edit-btn" onclick="openEditModal(${actualIndex})">✎</button>
                    <div class="category-badge" onclick="openEditModal(${actualIndex})">${item.category}</div>
                    <div class="item-image-placeholder">—</div>
                    <div class="item-content">
                        <div class="item-merchant">${item.merchant}</div>
                        <div class="item-name">${item.itemName}</div>
                        <div class="item-details">
                            ${item.color ? `<div class="detail-row"><span class="detail-label">Color</span><span class="detail-value">${item.color}</span></div>` : ''}
                            ${item.size ? `<div class="detail-row"><span class="detail-label">Size</span><span class="detail-value">${item.size}</span></div>` : ''}
                            ${item.purchaseDate ? `<div class="detail-row"><span class="detail-label">Date</span><span class="detail-value">${item.purchaseDate}</span></div>` : ''}
                        </div>
                        <div class="item-price">$${parseFloat(item.price || 0).toFixed(2)}</div>
                    </div>
                </div>
            `}).join('');
        }

        function setCategory(category) {
            currentCategory = category;
            renderAll();
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 2500);
        }

        document.getElementById('searchBox').addEventListener('input', function(e) {
            searchTerm = e.target.value;
            renderItems();
        });

        loadItems();
        syncFromSheet();
        setInterval(syncFromSheet, 60000);
    </script>
</body>
</html>
