<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Auto Closet</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 107, 107, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(78, 205, 196, 0.15) 0%, transparent 50%);
            z-index: 0;
            pointer-events: none;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4em;
            background: linear-gradient(135deg, #fff 0%, #ffc371 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            letter-spacing: -2px;
        }

        .subtitle {
            font-size: 1.1em;
            color: #888;
            font-weight: 300;
        }

        .auto-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(78, 205, 196, 0.2);
            border: 1px solid rgba(78, 205, 196, 0.4);
            padding: 8px 20px;
            border-radius: 30px;
            margin-top: 20px;
            font-size: 0.9em;
            color: #4ecdc4;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: #4ecdc4;
            border-radius: 50%;
            animation: pulseDot 1.5s infinite;
        }

        @keyframes pulseDot {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
            animation: fadeIn 1s ease 0.3s both;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 195, 113, 0.3);
        }

        .stat-value {
            font-size: 3em;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #ffc371 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .stat-label {
            font-size: 0.95em;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 300;
        }

        .controls {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 40px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
            animation: fadeIn 1s ease 0.5s both;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            color: #fff;
            font-size: 1em;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s;
        }

        .search-box:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 195, 113, 0.5);
        }

        .search-box::placeholder {
            color: #666;
        }

        .category-tabs {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .category-tab {
            padding: 12px 25px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            color: #ccc;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 500;
            transition: all 0.3s;
            font-family: 'Outfit', sans-serif;
            border: none;
        }

        .category-tab:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .category-tab.active {
            background: linear-gradient(135deg, #ff6b6b 0%, #ffc371 100%);
            border-color: transparent;
            color: #fff;
        }

        .add-btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ffc371 100%);
            border: none;
            border-radius: 15px;
            color: #fff;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            font-family: 'Outfit', sans-serif;
        }

        .add-btn:hover {
            transform: translateY(-2px);
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            animation: fadeIn 1s ease 0.9s both;
        }

        .item-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .item-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 60px rgba(255, 195, 113, 0.2);
            border-color: rgba(255, 195, 113, 0.3);
        }

        .item-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .item-image-placeholder {
            width: 100%;
            height: 250px;
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.2) 0%, rgba(78, 205, 196, 0.2) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4em;
        }

        .item-content {
            padding: 25px;
        }

        .item-merchant {
            font-size: 0.85em;
            color: #4ecdc4;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
        }

        .item-name {
            font-size: 1.4em;
            font-weight: 600;
            margin-bottom: 20px;
            color: #fff;
        }

        .item-details {
            display: grid;
            gap: 12px;
            margin-bottom: 20px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.9em;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .detail-label {
            color: #888;
        }

        .detail-value {
            font-weight: 600;
            color: #fff;
        }

        .item-price {
            font-size: 2em;
            font-weight: 700;
            background: linear-gradient(135deg, #ff6b6b 0%, #ffc371 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .category-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 8px 18px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffc371;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .delete-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(255, 71, 87, 0.9);
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2em;
            transition: transform 0.2s;
            font-weight: bold;
        }

        .delete-btn:hover {
            transform: scale(1.1);
            background: #ff4757;
        }

        .empty-state {
            text-align: center;
            padding: 100px 20px;
            color: #666;
            grid-column: 1 / -1;
        }

        .empty-icon {
            font-size: 5em;
            margin-bottom: 30px;
            opacity: 0.5;
        }

        .notification {
            position: fixed;
            top: 30px;
            right: 30px;
            background: rgba(78, 205, 196, 0.95);
            backdrop-filter: blur(10px);
            color: #000;
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            z-index: 3000;
            animation: slideInRight 0.4s ease;
            font-weight: 600;
        }

        @keyframes slideInRight {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a1a1a;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-title {
            font-size: 1.8em;
            font-weight: 700;
            margin-bottom: 25px;
            color: #ffc371;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #ccc;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: #fff;
            font-size: 1em;
            font-family: 'Outfit', sans-serif;
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: #ffc371;
        }

        .form-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            font-family: 'Outfit', sans-serif;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b6b 0%, #ffc371 100%);
            color: #fff;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>✨ MY CLOSET</h1>
            <p class="subtitle">Your Automated Wardrobe</p>
            <div class="auto-badge">
                <span class="pulse-dot"></span>
                <span>Auto-Updates Enabled</span>
            </div>
        </header>

        <div class="stats" id="stats"></div>

        <div class="controls">
            <input type="text" class="search-box" id="searchBox" placeholder="🔍 Search your closet...">
            <div class="category-tabs" id="categoryTabs"></div>
            <button class="add-btn" onclick="openAddModal()">+ Add Item</button>
        </div>

        <div class="items-grid" id="itemsGrid"></div>
    </div>

    <div class="modal" id="addModal">
        <div class="modal-content">
            <h2 class="modal-title">Add New Item</h2>
            <form id="addItemForm">
                <div class="form-group">
                    <label class="form-label">Store/Merchant</label>
                    <input type="text" class="form-input" id="merchant" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Item Name</label>
                    <input type="text" class="form-input" id="itemName" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Category</label>
                    <select class="form-select" id="category" required>
                        <option value="Tops">Tops</option>
                        <option value="Bottoms">Bottoms</option>
                        <option value="Dresses">Dresses</option>
                        <option value="Outerwear">Outerwear</option>
                        <option value="Shoes">Shoes</option>
                        <option value="Accessories">Accessories</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Price</label>
                    <input type="number" step="0.01" class="form-input" id="price" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Color</label>
                    <input type="text" class="form-input" id="color">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Size</label>
                    <input type="text" class="form-input" id="size">
                </div>

                <div class="form-buttons">
                    <button type="button" class="btn btn-secondary" onclick="closeAddModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add Item</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let items = [];
        let currentCategory = 'All';
        let searchTerm = '';

        // Check URL parameters for new item from Zapier
        function checkUrlParams() {
            const urlParams = new URLSearchParams(window.location.search);
            
            if (urlParams.has('merchant')) {
                const newItem = {
                    merchant: urlParams.get('merchant') || '',
                    itemName: urlParams.get('itemName') || urlParams.get('item_name') || 'New Item',
                    category: urlParams.get('category') || 'Other',
                    price: parseFloat(urlParams.get('price') || urlParams.get('total') || 0),
                    color: urlParams.get('color') || '',
                    size: urlParams.get('size') || '',
                    sku: urlParams.get('sku') || '',
                    purchaseDate: urlParams.get('purchaseDate') || urlParams.get('purchase_date') || '',
                    imageUrl: ''
                };

                if (newItem.price > 0) {
                    addItem(newItem);
                    showNotification('New item added from email! 🎉');
                    
                    // Clean URL
                    window.history.replaceState({}, document.title, window.location.pathname);
                }
            }
        }

        function addItem(item) {
            // Check for duplicates
            const isDuplicate = items.some(existing =>
                existing.merchant === item.merchant &&
                existing.sku === item.sku &&
                existing.price === item.price &&
                existing.purchaseDate === item.purchaseDate
            );

            if (!isDuplicate) {
                items.push(item);
                try {
                     window.storage.set(`item:${Date.now()}`, JSON.stringify(item));
                } catch (error) {
                    console.error('Storage error:', error);
                }
                renderAll();
            }
        }

        function loadItems() {
            try {
                const result =  window.storage.list('item:');
                if (result && result.keys && result.keys.length > 0) {
                    items = [];
                    for (const key of result.keys) {
                        const itemResult =  window.storage.get(key);
                        if (itemResult && itemResult.value) {
                            items.push(JSON.parse(itemResult.value));
                        }
                    }
                }
            } catch (error) {
                console.error('Error loading items:', error);
            }
            
            renderAll();
        }

        function renderAll() {
            renderStats();
            renderTabs();
            renderItems();
        }

        function renderStats() {
            const totalItems = items.length;
            const totalSpent = items.reduce((sum, item) => sum + parseFloat(item.price || 0), 0);
            const uniqueStores = new Set(items.map(item => item.merchant)).size;
            
            document.getElementById('stats').innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${totalItems}</div>
                    <div class="stat-label">Total Items</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">$${totalSpent.toFixed(2)}</div>
                    <div class="stat-label">Total Spent</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${uniqueStores}</div>
                    <div class="stat-label">Stores</div>
                </div>
            `;
        }

        function renderTabs() {
            const categories = ['All', ...new Set(items.map(item => item.category))];
            
            document.getElementById('categoryTabs').innerHTML = categories.map(cat => `
                <button class="category-tab ${currentCategory === cat ? 'active' : ''}" 
                        onclick="setCategory('${cat}')">
                    ${cat}
                </button>
            `).join('');
        }

        function renderItems() {
            let filteredItems = items;
            
            if (currentCategory !== 'All') {
                filteredItems = filteredItems.filter(item => item.category === currentCategory);
            }
            
            if (searchTerm) {
                filteredItems = filteredItems.filter(item => 
                    item.merchant?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    item.itemName?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    item.color?.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }
            
            if (filteredItems.length === 0) {
                document.getElementById('itemsGrid').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">👗</div>
                        <h3 style="color: #888; font-size: 1.5em; margin-bottom: 10px;">Your closet is ready</h3>
                        <p style="color: #666;">Add items manually or they'll appear automatically from receipts!</p>
                    </div>
                `;
                return;
            }
            
            document.getElementById('itemsGrid').innerHTML = filteredItems.map((item, index) => `
                <div class="item-card">
                    <button class="delete-btn" onclick="deleteItem(${items.indexOf(item)})" title="Delete">×</button>
                    <div class="category-badge">${item.category}</div>
                    ${item.imageUrl ? 
                        `<img src="${item.imageUrl}" alt="${item.itemName}" class="item-image">` : 
                        `<div class="item-image-placeholder">👔</div>`
                    }
                    <div class="item-content">
                        <div class="item-merchant">${item.merchant}</div>
                        <div class="item-name">${item.itemName}</div>
                        <div class="item-details">
                            ${item.color ? `<div class="detail-row"><span class="detail-label">Color</span><span class="detail-value">${item.color}</span></div>` : ''}
                            ${item.size ? `<div class="detail-row"><span class="detail-label">Size</span><span class="detail-value">${item.size}</span></div>` : ''}
                            ${item.purchaseDate ? `<div class="detail-row"><span class="detail-label">Purchased</span><span class="detail-value">${item.purchaseDate}</span></div>` : ''}
                        </div>
                        <div class="item-price">$${parseFloat(item.price || 0).toFixed(2)}</div>
                    </div>
                </div>
            `).join('');
        }

        function setCategory(category) {
            currentCategory = category;
            renderAll();
        }

        function openAddModal() {
            document.getElementById('addModal').classList.add('active');
        }

        function closeAddModal() {
            document.getElementById('addModal').classList.remove('active');
            document.getElementById('addItemForm').reset();
        }

        async function deleteItem(index) {
            if (confirm('Delete this item?')) {
                const item = items[index];
                items.splice(index, 1);
                
                try {
                    const result =  window.storage.list('item:');
                    if (result && result.keys) {
                        for (const key of result.keys) {
                            const itemResult =  window.storage.get(key);
                            if (itemResult && itemResult.value) {
                                const storedItem = JSON.parse(itemResult.value);
                                if (JSON.stringify(storedItem) === JSON.stringify(item)) {
                                     window.storage.delete(key);
                                    break;
                                }
                            }
                        }
                    }
                } catch (error) {
                    console.error('Error deleting:', error);
                }
                
                renderAll();
            }
        }

        document.getElementById('addItemForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const newItem = {
                merchant: document.getElementById('merchant').value,
                itemName: document.getElementById('itemName').value,
                category: document.getElementById('category').value,
                price: parseFloat(document.getElementById('price').value),
                color: document.getElementById('color').value,
                size: document.getElementById('size').value,
                purchaseDate: new Date().toISOString().split('T')[0],
                imageUrl: ''
            };
            
            addItem(newItem);
            closeAddModal();
            showNotification('Item added!');
        });

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        document.getElementById('searchBox').addEventListener('input', function(e) {
            searchTerm = e.target.value;
            renderItems();
        });

        // Initialize
        loadItems();
        checkUrlParams();
    </script>
</body>
</html>
